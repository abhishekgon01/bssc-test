<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSSC CGL 4 Premium Mock Portal</title>
    <style>
        :root {
            --primary-color: #0d6efd;
            --primary-hover: #0b5ed7;
            --bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --card-bg: #ffffff;
            --text-dark: #212529;
            --correct-color: #198754;
            --correct-bg: #d1e7dd;
            --wrong-color: #dc3545;
            --wrong-bg: #f8d7da;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 15px; 
            background: var(--bg-gradient); 
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            color: var(--text-dark);
        }

        .container { 
            width: 100%;
            max-width: 600px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 30px 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
        }

        h2 { 
            text-align: center; 
            color: var(--primary-color); 
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 0.5px;
            position: relative;
        }
        
        h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--primary-color);
            margin: 8px auto 0 auto;
            border-radius: 2px;
        }

        label { 
            font-weight: 600; 
            font-size: 15px; 
            display: block; 
            margin-top: 20px; 
            color: #495057;
        }

        select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            border-radius: 8px; 
            border: 2px solid #dee2e6; 
            font-size: 16px; 
            box-sizing: border-box; 
            background-color: #f8f9fa;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        select:focus {
            border-color: var(--primary-color);
            outline: none;
            background-color: #fff;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 25px; 
            border-radius: 8px; 
            border: none;
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
        }

        .btn-start {
            background-color: var(--primary-color); 
            color: white; 
        }

        .btn-start:hover { 
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(13, 110, 253, 0.3);
        }

        .stats-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 25px; 
            font-weight: 600; 
            background: #f1f7ff; 
            padding: 12px 16px; 
            border-radius: 8px; 
            font-size: 14px; 
            border: 1px solid #cce3ff; 
            color: #004085;
        }

        .timer { 
            color: var(--wrong-color); 
            background: #f8d7da;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #f5c6cb;
        }

        .badge { 
            background: linear-gradient(45deg, #6c757d, #495057); 
            color: white; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 11px; 
            font-weight: 600; 
            text-transform: uppercase;
            margin-bottom: 10px;
            display: inline-block;
        }

        .pyq-badge { 
            background: linear-gradient(45deg, #fd7e14, #ff9234); 
            color: white; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 11px; 
            font-weight: bold; 
            text-transform: uppercase;
            margin-bottom: 10px;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(253, 126, 20, 0.3);
        }

        .question { 
            font-weight: 700; 
            font-size: 19px; 
            color: #111; 
            line-height: 1.5; 
            margin-top: 5px;
        }

        .options { 
            list-style-type: none; 
            padding: 0; 
            margin-top: 20px; 
        }

        .options li { 
            margin: 12px 0; 
            padding: 15px; 
            background: #f8f9fa; 
            border: 2px solid #e9ecef; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            font-size: 16px; 
            font-weight: 500;
        }

        .options li:hover { 
            background: #eef5ff; 
            border-color: #b8daff; 
            transform: translateX(4px);
        }

        .hint-box { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #fff9e6; 
            border-left: 5px solid #ffc107; 
            border-radius: 6px; 
            font-size: 14px; 
            color: #533f03; 
            display: none; 
            line-height: 1.5; 
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .hidden { display: none; }
        
        #result { 
            margin-top: 10px; 
            text-align: center; 
            font-size: 16px; 
            line-height: 1.6; 
        }

        .score-big { 
            font-size: 36px; 
            color: var(--correct-color); 
            font-weight: 800; 
            margin: 20px 0; 
            background: #e8f5e9;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            min-width: 150px;
            border: 2px dashed #a5d6a7;
        }

        #next-btn { background-color: var(--correct-color); color: white; margin-top: 20px; box-shadow: 0 4px 12px rgba(25, 135, 84, 0.2); }
        #next-btn:hover { background-color: #157347; }
        #restart-btn { background-color: #6c757d; color: white; margin-top: 15px; }
        #restart-btn:hover { background-color: #5a6268; }

        .info-card {
            font-size: 13px; 
            color: #51400a; 
            background: #fff3cd; 
            padding: 14px; 
            border-radius: 10px; 
            margin-top: 20px; 
            border: 1px solid #ffe69c;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>BSSC CGL अभ्यास पोर्टल</h2>

        <div id="setup-screen">
            <label for="topic">1. टेस्ट का प्रकार चुनें:</label>
            <select id="topic">
                <option value="pyq">🔥 BSSC CGL प्रीवियस ईयर पेपर्स (PYQs)</option>
                <option value="full">🏆 FULL MOCK TEST (सभी विषयों का कंबाइंड पेपर)</option>
                <option value="gk">📚 सामान्य अध्ययन (General Studies)</option>
                <option value="science">🧪 सामान्य विज्ञान (General Science)</option>
                <option value="math">🧮 गणित (Mathematics)</option>
                <option value="reasoning">🧠 मानसिक क्षमता जाँच (Reasoning)</option>
            </select>

            <label for="q-limit">2. प्रश्नों की संख्या चुनें:</label>
            <select id="q-limit">
                <option value="20">20 प्रश्न (क्विक प्रैक्टिस)</option>
                <option value="30">30 प्रश्न (मीडियम मॉक)</option>
                <option value="50">50 प्रश्न (फुल सेक्शनल अभ्यास)</option>
            </select>

            <div class="info-card">
                📌 <b>परीक्षा निर्देश:</b><br>
                • विकल्प (Options) अब हर बार रैंडम होकर आएंगे, उत्तर रटने की कोशिश न करें।<br>
                • मार्किंग: सही उत्तर पर <span style="color:var(--correct-color); font-weight:bold;">+4 अंक</span> | गलत उत्तर पर <span style="color:var(--wrong-color); font-weight:bold;">-1 अंक</span> (Negative Marking).<br>
                • प्रत्येक प्रश्न पर 50 सेकंड की समय सीमा लागू रहेगी।
            </div>
            <button class="btn-start" onclick="startTest()">टेस्ट प्रारंभ करें</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="stats-bar">
                <div id="q-count">प्रश्न: 1/--</div>
                <div id="live-score">अंक: 0</div>
                <div class="timer">⏱️ <span id="time-left">50</span>s</div>
            </div>
            
            <div id="question-container"></div>
            <div id="hint-container" class="hint-box"></div>
            
            <button id="next-btn" class="hidden" onclick="nextQuestion()">अगला प्रश्न ❯</button>
            <button id="restart-btn" class="hidden" onclick="restartTest()">मुख्य पृष्ठ पर जाएँ ↺</button>
        </div>
    </div>

    <script>
        const questionBank = {
            pyq: [
                { q: "बिहार में स्थायी बंदोबस्त (Permanent Settlement) लागू करने का मुख्य कारण क्या था?", options: ["भू-राजस्व का राजस्व निर्णय करना", "जमींदारों का भूमि पर अधिकार नष्ट करना", "जमींदारों के लिए जमीन पर वंशपारंपरिक अधिकार", "जमींदारी प्रथा का उन्मूलन"], ans: "भू-राजस्व का राजस्व निर्णय करना", hint: "<b>BSSC CGL PYQ:</b> लॉर्ड कॉर्नवालिस द्वारा 1793 में स्थायी बंदोबस्त लागू किया गया था। इसका मुख्य उद्देश्य कंपनी के लिए भू-राजस्व की एक निश्चित राशि तय करना था।", type: "PYQ - GS" },
                { q: "जगदीशपुर (बिहार) में 1857 के विप्लव/क्रांति के नेता कौन थे?", options: ["कुंवर सिंह", "ताना भगत", "नाना साहब", "तीरथ सिंह"], ans: "कुंवर सिंह", hint: "<b>BSSC CGL PYQ:</b> बाबू कुंवर सिंह जगदीशपुर के जमींदार थे, जिन्होंने 80 वर्ष की आयु में 1857 की क्रांति में बिहार का सफल नेतृत्व किया था।", type: "PYQ - GS" },
                { q: "एक सिंह वाले गैंडे के लिए प्रसिद्ध 'काजीरंगा राष्ट्रीय उद्यान' किस राज्य में स्थित है?", options: ["असम", "पश्चिम बंगाल", "अरुणाचल प्रदेश", "ओडिशा"], ans: "असम", hint: "<b>BSSC CGL PYQ:</b> काजीरंगा राष्ट्रीय उद्यान असम में स्थित है। यह यूनेस्को (UNESCO) की विश्व धरोहर सूची में भी शामिल है।", type: "PYQ - GS" },
                { q: "यदि $A : B = 3 : 4$ तथा $B : C = 8 : 9$ हो, तो $A : C$ का मान क्या होगा?", options: ["2 : 3", "1 : 2", "3 : 2", "4 : 3"], ans: "2 : 3", hint: "<b>BSSC CGL PYQ (Math):</b> $\\frac{A}{C} = \\frac{A}{B} \\times \\frac{B}{C} = \\frac{3}{4} \\times \\frac{8}{9} = \\frac{2}{3}$। यानी 2 : 3।", type: "PYQ - MATH" },
                { q: "नीचे दी गई श्रृंखला में लुप्त संख्या (?) ज्ञात कीजिए: 5, 11, 23, 47, ?", options: ["95", "96", "94", "98"], ans: "95", hint: "<b>BSSC CGL PYQ (Reasoning):</b> पैटर्न है: $(नंबर \\times 2) + 1$ <br>47*2+1 = 94+1 = 95।", type: "PYQ - REASONING" }
            ],
            gk: [
                { q: "बिहार में 'तिनकठिया पद्धति' के तहत नील की खेती के लिए कितनी भूमि आरक्षित की जानी थी?", options: ["3/20 भाग", "3/10 भाग", "1/20 भाग", "5/20 भाग"], ans: "3/20 भाग", hint: "व्याख्या: चंपारण में किसानों को अपनी प्रति बीघा (20 कट्ठा) जमीन के 3 कट्ठे पर नील की खेती करना अनिवार्य था।", type: "सामान्य अध्ययन" },
                { q: "संविधान के किस अनुच्छेद के तहत राज्यों में 'राज्यपाल' की व्यवस्था की गई है?", options: ["अनुच्छेद 153", "अनुच्छेद 155", "अनुच्छेद 163", "अनुच्छेद 123"], ans: "अनुच्छेद 153", hint: "व्याख्या: अनुच्छेद 153 के अनुसार प्रत्येक राज्य के लिए एक राज्यपाल होगा।", type: "सामान्य अध्ययन" },
                { q: "जैन धर्म के 24वें तीर्थंकर महावीर स्वामी का जन्म बिहार में कहाँ हुआ था?", options: ["कुंडग्राम (वैशाली)", "पावापुरी", "लौरिया", "बोधगया"], ans: "कुंडग्राम (वैशाली)", hint: "व्याख्या: महावीर स्वामी का जन्म वैशाली के निकट कुंडग्राम में हुआ था और उनका निर्वाण पावापुरी में हुआ था।", type: "सामान्य अध्ययन" }
            ],
            science: [
                { q: "यदि किसी वस्तु का वेग (Velocity) दोगुना कर दिया जाए, तो उसकी गतिज ऊर्जा (Kinetic Energy) पर क्या प्रभाव पड़ेगा?", options: ["चार गुनी हो जाएगी", "दोगुनी हो जाएगी", "आधी रह जाएगी", "अपरिवर्तित रहेगी"], ans: "चार गुनी हो जाएगी", hint: "सूत्र: $K.E. = \\frac{1}{2}mv^2$ होता है। वेग ($v$) को दोगुना करने पर ऊर्जा चार गुना हो जाएगी।", type: "सामान्य विज्ञान" },
                { q: "मानव शरीर में रक्त का थक्का (Blood Clotting) जमाने में कौन सा विटामिन सहायक होता है?", options: ["विटामिन K", "विटामिन E", "विटामिन C", "विटामिन D"], ans: "विटामिन K", hint: "व्याख्या: विटामिन K (फिलोक्विनोन) यकृत में प्रोथ्रोम्बिन नामक प्रोटीन बनाने के लिए आवश्यक है जो रक्त का थक्का जमाता है।", type: "सामान्य विज्ञान" }
            ],
            math: [
                { q: "एक परीक्षा में उत्तीर्ण होने के लिए 36% अंकों की आवश्यकता है। एक छात्र को 190 अंक मिले और वह 26 अंकों से अनुत्तीर्ण हो गया। परीक्षा के कुल पूर्णांक क्या हैं?", options: ["600", "500", "550", "650"], ans: "600", hint: "हल: पास होने के लिए आवश्यक अंक = 190 + 26 = 216. यानी, कुल अंक का 36% = 216. कुल पूर्णांक = $(216 / 36) \\times 100 = 600$.", type: "गणित" },
                { q: "यदि 15 वस्तुओं का क्रय मूल्य (CP), 12 वस्तुओं के विक्रय मूल्य (SP) के बराबर है, तो लाभ प्रतिशत ज्ञात करें।", options: ["25%", "20%", "15%", "30%"], ans: "25%", hint: "शॉर्टकट: $15CP = 12SP \\Rightarrow \\frac{CP}{SP} = \\frac{12}{15}$. लाभ% = $(\\frac{1}{4}) \\times 100 = 25\\%$.", type: "गणित" }
            ],
            reasoning: [
                { q: "यदि एक कूट भाषा में 'BIHAR' को 'CJIBS' लिखा जाता है, तो उसी भाषा में 'PATNA' को क्या लिखा जाएगा?", options: ["QBUOB", "QBVOB", "OZSMB", "QBUOA"], ans: "QBUOB", hint: "लॉजिक: यहाँ हर अक्षर में +1 जोड़ा गया है। P+1=Q, A+1=B... अतः QBUOB होगा।", type: "रीजनिंग" },
                { q: "एक व्यक्ति पूर्व की ओर 5 किमी चलता है, फिर बाईं ओर मुड़कर 12 किमी चलता है। वह अपने प्रारंभिक बिंदु से कितनी दूरी पर है?", options: ["13 किमी", "17 किमी", "7 किमी", "14 किमी"], ans: "13 किमी", hint: "लॉजिक: दूरी = $\\sqrt{5^2 + 12^2} = \\sqrt{25 + 144} = \\sqrt{169} = 13$ किमी।", type: "रीजनिंग" }
            ]
        };

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let totalMarks = 0;
        let timerInterval;
        let timeLeft = 50;

        function startTest() {
            const selectedMode = document.getElementById("topic").value;
            const qLimit = parseInt(document.getElementById("q-limit").value);
            
            let rawQuestions = [];
            if (selectedMode === "full") {
                rawQuestions = [
                    ...questionBank.pyq,
                    ...questionBank.gk,
                    ...questionBank.science,
                    ...questionBank.math,
                    ...questionBank.reasoning
                ];
            } else {
                rawQuestions = [...questionBank[selectedMode]];
            }
            
            rawQuestions.sort(() => 0.5 - Math.random());
            currentQuestions = rawQuestions.slice(0, qLimit);
            
            currentQuestionIndex = 0;
            totalMarks = 0;

            document.getElementById("setup-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("restart-btn").classList.add("hidden");
            
            loadQuestion();
        }

        function loadQuestion() {
            clearInterval(timerInterval);
            if (currentQuestionIndex >= currentQuestions.length) {
                showResult();
                return;
            }

            timeLeft = 50;
            document.getElementById("time-left").innerText = timeLeft;
            document.getElementById("q-count").innerText = `प्रश्न: ${currentQuestionIndex + 1}/${currentQuestions.length}`;
            document.getElementById("live-score").innerText = `अंक: ${totalMarks}`;
            document.getElementById("next-btn").classList.add("hidden");
            document.getElementById("hint-container").style.display = "none";

            const qContainer = document.getElementById("question-container");
            const qData = currentQuestions[currentQuestionIndex];

            let shuffledOptions = [...qData.options].sort(() => 0.5 - Math.random());
            let isPYQ = qData.type.startsWith("PYQ");
            let badgeClass = isPYQ ? "pyq-badge" : "badge";

            let html = `<div><span class="${badgeClass}">${qData.type}</span></div><div class="question">${qData.q}</div><ul class="options">`;
            shuffledOptions.forEach(opt => {
                html += `<li onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}', '${qData.ans.replace(/'/g, "\\'")}')">${opt}</li>`;
            });
            html += `</ul>`;
            qContainer.innerHTML = html;

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById("time-left").innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    autoWrongAnswer(qData.ans);
                }
            }, 1000);
        }

        function checkAnswer(element, selected, correct) {
            clearInterval(timerInterval);
            const options = document.querySelectorAll(".options li");
            options.forEach(opt => opt.style.pointerEvents = "none");

            const qData = currentQuestions[currentQuestionIndex];
            const hintBox = document.getElementById("hint-container");
            hintBox.innerHTML = qData.hint;
            hintBox.style.display = "block"; 

            if (selected === correct) {
                element.style.backgroundColor = "var(--correct-bg)";
                element.style.borderColor = "#badbcc";
                element.style.color = "var(--correct-color)";
                totalMarks += 4;
            } else {
                element.style.backgroundColor = "var(--wrong-bg)";
                element.style.borderColor = "#f5c6cb";
                element.style.color = "var(--wrong-color)";
                totalMarks -= 1;
                options.forEach(opt => {
                    if(opt.innerText === correct) {
                        opt.style.backgroundColor = "var(--correct-bg)";
                        opt.style.color = "var(--correct-color)";
                        opt.style.borderColor = "#badbcc";
                    }
                });
            }
            document.getElementById("live-score").innerText = `अंक: ${totalMarks}`;
            document.getElementById("next-btn").classList.remove("hidden");
        }

        function autoWrongAnswer(correct) {
            const options = document.querySelectorAll(".options li");
            options.forEach(opt => {
                opt.style.pointerEvents = "none";
                if(opt.innerText === correct) {
                    opt.style.backgroundColor = "var(--correct-bg)";
                    opt.style.color = "var(--correct-color)";
                    opt.style.borderColor = "#badbcc";
                }
            });
            totalMarks -= 1;
            document.getElementById("live-score").innerText = `अंक: ${totalMarks}`;
            
            const hintBox = document.getElementById("hint-container");
            hintBox.innerHTML = currentQuestions[currentQuestionIndex].hint + " <br><span style='color:var(--wrong-color); font-weight:bold;'>⏱️ समय समाप्त! नेगेटिव मार्किंग लागू (-1 अंक)</span>";
            hintBox.style.display = "block";
            
            document.getElementById("next-btn").classList.remove("hidden");
        }

        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        function showResult() {
            clearInterval(timerInterval);
            const maxPossibleMarks = currentQuestions.length * 4;
            let accuracy = Math.round((totalMarks / maxPossibleMarks) * 100);
            if(accuracy < 0) accuracy = 0;

            let message = "मेहनत जारी रखिए, इस बार कट-ऑफ पार करना है! 📚";
            if(accuracy >= 80) message = "अद्भुत स्कोर! आपकी तैयारी का स्तर शीर्ष पर है! 🔥";
            else if(accuracy >= 65) message = "बढ़िया प्रयास! थोड़ा गति और शुद्धता पर और काम करें। 👍";

            document.getElementById("question-container").innerHTML = `
                <div id="result">
                    <p style="font-size:20px; font-weight:bold; color:#495057;">✨ परीक्षा परिणाम ✨</p>
                    <div class="score-big">${totalMarks} / ${maxPossibleMarks}</div>
                    <p><b>कुल प्रश्न हल किए:</b> ${currentQuestions.length}</p>
                    <p><b>सफलता अनुपात (Accuracy Score):</b> ${accuracy}%</p>
                    <p style="font-weight:bold; color:var(--primary-color); margin-top:20px; font-size:16px;">${message}</p>
                </div>
            `;
            document.getElementById("next-btn").classList.add("hidden");
            document.getElementById("hint-container").style.display = "none";
            document.getElementById("restart-btn").classList.remove("hidden");
        }

        function restartTest() {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("setup-screen").classList.remove("hidden");
        }
    </script>
</body>
</html>
